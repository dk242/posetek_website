          POSE_CONNECTIONS.forEach(([s,e])=>{
            const p1=frame[s], p2=frame[e];
            if (!p1||!p2) return;
            const x1=p1[0]*W, y1=p1[1]*H;
            const x2=p2[0]*W, y2=p2[1]*H;
            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.stroke();
          });
        }

        // --- draw joints ---
        const baseRadius = 4;
        frame.forEach((p,jointIdx)=>{
          if (!p) return;
          const x=p[0]*W, y=p[1]*H;
          ctx.beginPath();
          ctx.arc(x,y,baseRadius * (manualZoomBounds ? scalePx : 1),0,2*Math.PI);
          const isYellow = selectedJoints.has(jointIdx);
          if (isYellow){
            ctx.fillStyle='yellow';
            ctx.strokeStyle='orange';
            ctx.lineWidth=2 * (manualZoomBounds ? scalePx : 1);
            ctx.fill(); ctx.stroke();
          } else {
            ctx.fillStyle='#00ff66';
            ctx.fill();
          }
        });

        // Draw overlay pose on pose canvas as well (semi-transparent amber)
        if (overlayPoseData && Array.isArray(overlayPoseData) && overlayPoseData.length) {
          let i2 = Math.max(0, Math.min(idx + overlayFrameShift, overlayPoseData.length - 1));
          let fr2Raw = overlayPoseData[i2];
          let fr2 = normalizePoseFrame(fr2Raw);
          if (!Array.isArray(fr2) || !fr2.some(p=>p)) {
            const fb2 = findNearestValidFrameIndex(i2, overlayPoseData);
            /* console.warn(`[PoseCanvas] Missing/invalid overlay at idx=${i2}; fb2=${fb2}`); */
            if (fb2 != null) { i2 = fb2; fr2Raw = overlayPoseData[i2]; fr2 = normalizePoseFrame(fr2Raw); }
          }
          const hasOverlay = Array.isArray(fr2) && fr2.some(p=>p);
          /* console.log(`[PoseCanvas] overlay active=${true} requestedIdx=${idx} usedIdx=${i2} hasOverlay=${hasOverlay} len=${fr2?.length}`); */
          if (hasOverlay) {
            // apply one-time normalized translation if present
            let dxPx = 0, dyPx = 0;
            if (overlayAlignOffsetN) {
              dxPx = overlayAlignOffsetN.dx * W;
              dyPx = overlayAlignOffsetN.dy * H;
            }
            ctx.save();
            ctx.globalAlpha = 0.6;
            ctx.strokeStyle = 'rgba(200,200,200,0.9)';
            ctx.lineWidth = (baseStroke * 0.65) * (manualZoomBounds ? scalePx : 1);
            const edges2 = (fr2.length === 17) ? COCO17_EDGES : POSE_CONNECTIONS;
            edges2.forEach(([s,e])=>{
              const p1=fr2[s], p2=fr2[e];
              if (!p1||!p2) return;
              const x1=p1[0]*W + dxPx, y1=p1[1]*H + dyPx;
              const x2=p2[0]*W + dxPx, y2=p2[1]*H + dyPx;
              ctx.beginPath();
              ctx.moveTo(x1,y1);
              ctx.lineTo(x2,y2);
              ctx.stroke();
            });
            // draw overlay joints (darker green)
            ctx.fillStyle = 'rgba(12,150,70,0.85)';
            const rOv = baseRadius * 0.9 * (manualZoomBounds ? scalePx : 1);
            fr2.forEach(p=>{
              if (!p) return;
              ctx.beginPath();
              ctx.arc(p[0]*W + dxPx, p[1]*H + dyPx, rOv, 0, Math.PI*2);
              ctx.fill();
            });
            ctx.restore();
          }
        }

        // Draw overlay ball box on pose canvas (semi-transparent red)
        if (overlayBallBoxes && Array.isArray(overlayBallBoxes) && overlayBallBoxes.length) {
          let i2 = Math.max(0, Math.min(idx + overlayFrameShift, overlayBallBoxes.length - 1));
          const bbox = overlayBallBoxes[i2];
          if (bbox) {
            const [x1,y1,x2,y2] = bbox;
            const cx = ((x1+x2)/2)*W;
            const cy = ((y1+y2)/2)*H;
            const r  = ((x2-x1)*W)/2;
            // apply same translation as overlay pose
            let dxPx = 0, dyPx = 0;
            if (overlayAlignOffsetN) {
              dxPx = overlayAlignOffsetN.dx * W;
              dyPx = overlayAlignOffsetN.dy * H;
            }
            ctx.save();
            ctx.globalAlpha = 0.4;
            ctx.strokeStyle='red';
            ctx.lineWidth=2;
            ctx.beginPath();
            ctx.arc(cx + dxPx, cy + dyPx, r, 0, 2*Math.PI);
            ctx.stroke();
            ctx.restore();
          }
        }

        // Draw pro overlay pose (light ghost when proOverlayActive)
        if (proOverlayActive && proPoseData && Array.isArray(proPoseData) && proPoseData.length) {
          let iPro = Math.max(0, Math.min(idx + proFrameShift, proPoseData.length - 1));
          let frProRaw = proPoseData[iPro];
          let frPro = normalizePoseFrame(frProRaw);
          if (!Array.isArray(frPro) || !frPro.some(p=>p)) {
            const fbPro = findNearestValidFrameIndex(iPro, proPoseData);
            if (fbPro != null) { iPro = fbPro; frProRaw = proPoseData[iPro]; frPro = normalizePoseFrame(frProRaw); }
          }
          const hasPro = Array.isArray(frPro) && frPro.some(p=>p);
          if (hasPro) {
            const isKeyframe = analysisMode && (analysisPhase === 'backswing' || analysisPhase === 'contact');
            const backswingFrame = ballTrajectory?.transition_frame != null ? Math.round(Number(ballTrajectory.transition_frame)) : null;
            const contactFrameNum = Number(ballTrajectory?.contact_frame ?? ballInfo?.contact_frame);
            const atBackswing = Number.isFinite(backswingFrame) && idx === backswingFrame;
            const atContact = Number.isFinite(contactFrameNum) && idx === Math.round(contactFrameNum);
            // At backswing keyframe: align by plant foot at backswing; at contact or elsewhere: align by plant foot at contact
            const proCfIdx = proBallTrajectory?.contact_frame != null ? Math.round(Number(proBallTrajectory.contact_frame)) : null;
            const proBsIdx = proBallTrajectory?.transition_frame != null ? Math.round(Number(proBallTrajectory.transition_frame)) : null;
            let alignOffset = (atBackswing && proAlignOffsetN_backswing) ? proAlignOffsetN_backswing : proAlignOffsetN;
            const alignSourceIsBackswing = !!(atBackswing && proAlignOffsetN_backswing);
            if (flipProX && alignOffset) {
              const proFrameForAlign = alignSourceIsBackswing && Number.isFinite(proBsIdx) ? proBsIdx : proCfIdx;
              const plantIdxAlign = getPlantFootIndex(poseType, firestoreRepData?.strikeFoot);
              if (plantIdxAlign != null && Number.isFinite(proFrameForAlign)) {
                const rawPAlign = normalizePoseFrame(proPoseData[Math.min(proFrameForAlign, proPoseData.length - 1)]);
                const pp = rawPAlign && rawPAlign[plantIdxAlign] ? rawPAlign[plantIdxAlign] : null;
                if (pp) alignOffset = adjustProAlignOffsetForMirror(alignOffset, pp);
              }
            }
            let dxPx = 0, dyPx = 0;
            if (alignOffset) {
              dxPx = alignOffset.dx * W;
              dyPx = alignOffset.dy * H;
            }
            const sf = proScaleFactor;
            let proAnchorPx = 0, proAnchorPy = 0;
            const plantIdx = getPlantFootIndex(poseType, firestoreRepData?.strikeFoot);
            const anchorFrameIdx = atBackswing && Number.isFinite(proBsIdx) ? proBsIdx : proCfIdx;
            let frProAnchor = anchorFrameIdx != null ? normalizePoseFrame(proPoseData[Math.min(anchorFrameIdx, proPoseData.length - 1)]) : null;
            if (flipProX) {
              frPro = mirrorPoseFrameX(frPro);
              if (frProAnchor) frProAnchor = mirrorPoseFrameX(frProAnchor);
            }
            if (plantIdx != null && frProAnchor && frProAnchor[plantIdx]) {
              proAnchorPx = frProAnchor[plantIdx][0] * W;
              proAnchorPy = frProAnchor[plantIdx][1] * H;
            } else {
              const _hips = poseType === 17 ? [11, 12] : [23, 24];
              if (frPro[_hips[0]] && frPro[_hips[1]]) {
                proAnchorPx = (frPro[_hips[0]][0] + frPro[_hips[1]][0]) / 2 * W;
                proAnchorPy = (frPro[_hips[0]][1] + frPro[_hips[1]][1]) / 2 * H;
              }
            }
            let sxBase = dxPx + proAnchorPx * (1 - sf);
            let syBase = dyPx + proAnchorPy * (1 - sf);
            if (atBackswing && plantIdx != null && frame && frame[plantIdx] && frPro[plantIdx]) {
              sxBase = frame[plantIdx][0] * W - frPro[plantIdx][0] * W * sf;
              syBase = frame[plantIdx][1] * H - frPro[plantIdx][1] * H * sf;
            } else if (atContact) {
              const strikeIdx = getStrikeFootIndex(poseType, firestoreRepData?.strikeFoot);
              if (strikeIdx != null && frame && frame[strikeIdx] && frPro[strikeIdx]) {
                sxBase = frame[strikeIdx][0] * W - frPro[strikeIdx][0] * W * sf;
                syBase = frame[strikeIdx][1] * H - frPro[strikeIdx][1] * H * sf;
              }
            }
            const proAlpha = isKeyframe ? 0.4 : 0.25;
            const angleDefs = getAngleJointDefs(poseType);
            let disparities = [];
            if (isKeyframe && (atBackswing || atContact)) {
              const phase = atBackswing ? 'backswing' : 'contact';
              angleDefs.forEach(def => {
                const uAng = computeJointAngle(frame, def.joints[0], def.joints[1], def.joints[2]);
                const pAng = computeJointAngle(frPro, def.joints[0], def.joints[1], def.joints[2]);
                if (uAng != null && pAng != null) {
                  const diff = Math.abs(uAng - pAng);
                  if (diff >= ANGLE_DISPARITY_THRESHOLD) {
                    disparities.push({ name: def.name, userAngle: uAng, proAngle: pAng, diff, phase, vertexIdx: def.joints[1], color: def.color });
                  }
                }
              });
            }
            const edgesPro = (frPro.length === 17) ? COCO17_EDGES : POSE_CONNECTIONS;
            ctx.save();
            ctx.globalAlpha = proAlpha;
            ctx.strokeStyle = 'rgba(255, 193, 7, 0.9)';
            ctx.lineWidth = (baseStroke * 0.6) * (manualZoomBounds ? scalePx : 1);
            edgesPro.forEach(([s,e])=>{
              const p1=frPro[s], p2=frPro[e];
              if (!p1||!p2) return;
              const x1=p1[0]*W*sf + sxBase, y1=p1[1]*H*sf + syBase;
              const x2=p2[0]*W*sf + sxBase, y2=p2[1]*H*sf + syBase;
              ctx.beginPath();
              ctx.moveTo(x1,y1);
              ctx.lineTo(x2,y2);
              ctx.stroke();
            });
            ctx.fillStyle = 'rgba(255, 193, 7, 0.4)';
            const rPro = baseRadius * 0.8 * (manualZoomBounds ? scalePx : 1);
            frPro.forEach((p, pi)=>{
              if (!p) return;
              ctx.beginPath();
              ctx.arc(p[0]*W*sf + sxBase, p[1]*H*sf + syBase, rPro, 0, Math.PI*2);
              ctx.fill();
            });
            ctx.restore();

            // --- Yellow shaded position difference (user vs pro) for limbs from annotationData/kickAnalysisData ---
            if (isKeyframe && (atBackswing || atContact) && frame && annPhase && annData?.[annPhase]?.position_diff_limbs?.length) {
              const diffLimbs = annData[annPhase].position_diff_limbs;
              ctx.save();
              diffLimbs.forEach(limb => {
                const [i1, i2] = limb.joints;
                const uP1 = frame[i1], uP2 = frame[i2];
                const pP1 = frPro[i1], pP2 = frPro[i2];
                if (!uP1 || !uP2 || !pP1 || !pP2) return;

                const ux1 = uP1[0] * W, uy1 = uP1[1] * H;
                const ux2 = uP2[0] * W, uy2 = uP2[1] * H;
                const px1 = pP1[0] * W * sf + sxBase, py1 = pP1[1] * H * sf + syBase;
                const px2 = pP2[0] * W * sf + sxBase, py2 = pP2[1] * H * sf + syBase;

                ctx.beginPath();
                ctx.moveTo(ux1, uy1);
                ctx.lineTo(ux2, uy2);
                ctx.lineTo(px2, py2);
                ctx.lineTo(px1, py1);
                ctx.closePath();
                ctx.fillStyle = 'rgba(255, 255, 0, 0.15)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 235, 59, 0.4)';
                ctx.lineWidth = 1.5 * (manualZoomBounds ? scalePx : 1);
                ctx.stroke();
              });
              ctx.restore();
            }

            // Skip pro disparity info buttons when in annotation mode (coach) or analysis mode (player) - only show annotationData/kickAnalysisData
            if (annotationMode || analysisMode) {
              window.__proDisparitiesForInfoBtns = null;
            } else if (disparities.length) {
              window.__proDisparitiesForInfoBtns = { disparities, dxPx, dyPx, W, H, frPro, poseType, sf, sxBase, syBase };
            } else {
              window.__proDisparitiesForInfoBtns = null;
            }

            // --- Red gradient highlight on specific USER limbs at BACKSWING keyframe ---
            // Skip default hardcoded annotations when in annotation mode (coach) or analysis mode (player) - only show annotationData/kickAnalysisData
            if (atBackswing && frame && !annotationMode && !analysisMode) {
              const _foot = firestoreRepData?.strikeFoot ? String(firestoreRepData.strikeFoot).toLowerCase() : null;
              if (_foot) {
                const _isC17 = poseType === 17;
                const _plantIsLeft = _foot === 'right';
                const redLimbs = [];
                if (_isC17) {
                  if (_plantIsLeft) {
                    redLimbs.push({ name: 'Plant Shank', joints: [15, 13] });
                    redLimbs.push({ name: 'Strike Thigh', joints: [14, 12] });
                    redLimbs.push({ name: 'Plant Forearm', joints: [7, 9] });
                    redLimbs.push({ name: 'Plant Upper Arm', joints: [5, 7] });
                  } else {
                    redLimbs.push({ name: 'Plant Shank', joints: [16, 14] });
                    redLimbs.push({ name: 'Strike Thigh', joints: [13, 11] });
                    redLimbs.push({ name: 'Plant Forearm', joints: [8, 10] });
                    redLimbs.push({ name: 'Plant Upper Arm', joints: [6, 8] });
                  }
                } else {
                  if (_plantIsLeft) {
                    redLimbs.push({ name: 'Plant Shank', joints: [27, 25] });
                    redLimbs.push({ name: 'Strike Thigh', joints: [26, 24] });
                    redLimbs.push({ name: 'Plant Forearm', joints: [13, 15] });
                    redLimbs.push({ name: 'Plant Upper Arm', joints: [11, 13] });
                  } else {
                    redLimbs.push({ name: 'Plant Shank', joints: [28, 26] });
                    redLimbs.push({ name: 'Strike Thigh', joints: [25, 23] });
                    redLimbs.push({ name: 'Plant Forearm', joints: [14, 16] });
                    redLimbs.push({ name: 'Plant Upper Arm', joints: [12, 14] });
                  }
                }

                ctx.save();
                redLimbs.forEach(limb => {
                  const [i1, i2] = limb.joints;
                  const p1 = frame[i1], p2 = frame[i2];
                  if (!p1 || !p2) return;
                  const x1 = p1[0] * W, y1 = p1[1] * H;
                  const x2 = p2[0] * W, y2 = p2[1] * H;
                  const grad = ctx.createLinearGradient(x1, y1, x2, y2);
                  grad.addColorStop(0, 'rgba(239, 68, 68, 0.95)');
                  grad.addColorStop(0.5, 'rgba(248, 113, 113, 0.8)');
                  grad.addColorStop(1, 'rgba(239, 68, 68, 0.95)');
                  ctx.strokeStyle = grad;
                  ctx.lineWidth = 8 * (manualZoomBounds ? scalePx : 1);
                  ctx.lineCap = 'round';
                  ctx.beginPath();
                  ctx.moveTo(x1, y1);
                  ctx.lineTo(x2, y2);
                  ctx.stroke();
                  ctx.strokeStyle = 'rgba(255, 180, 180, 0.35)';
                  ctx.lineWidth = 16 * (manualZoomBounds ? scalePx : 1);
                  ctx.beginPath();
                  ctx.moveTo(x1, y1);
                  ctx.lineTo(x2, y2);
                  ctx.stroke();
                });
                ctx.restore();

                window.__backswingRedLimbs = { limbs: redLimbs, frame, W, H, poseType };
              } else {
                window.__backswingRedLimbs = null;
              }
            } else {
              window.__backswingRedLimbs = null;
            }
          }
        } else {
          window.__proDisparitiesForInfoBtns = null;
          window.__backswingRedLimbs = null;
        }
      }

      // --- Annotation red limbs (from annotationData or kickAnalysisData) - only in analysis/annotation mode ---
      if ((analysisMode || annotationMode) && hasPose && frame && annPhase && annData?.[annPhase]?.red_limbs?.length) {
        const scalePxAnn = manualZoomBounds ? (manualZoomBounds.rightX - manualZoomBounds.leftX) : 1;
        ctx.save();
        annData[annPhase].red_limbs.forEach(limb => {
          const [i1, i2] = limb.joints;
          const p1 = frame[i1], p2 = frame[i2];
          if (!p1 || !p2) return;
          const x1 = p1[0] * W, y1 = p1[1] * H;
          const x2 = p2[0] * W, y2 = p2[1] * H;
          const grad = ctx.createLinearGradient(x1, y1, x2, y2);
          grad.addColorStop(0, 'rgba(239, 68, 68, 0.95)');
          grad.addColorStop(0.5, 'rgba(248, 113, 113, 0.8)');
          grad.addColorStop(1, 'rgba(239, 68, 68, 0.95)');
          ctx.strokeStyle = grad;
          ctx.lineWidth = 8 * scalePxAnn;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.strokeStyle = 'rgba(255, 180, 180, 0.35)';
          ctx.lineWidth = 16 * scalePxAnn;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        });
        ctx.restore();
      }

      // --- Annotation info circle connector lines (from circle position to joint/limb anchor) ---
      // Draw in display space so the info-circle end matches the overlay buttons (which don't transform with zoom)
      // When analysis-feedback-visible, the canvas is centered in the wrapper (letterboxed); overlay buttons use wrapper coords
      // Only show in analysis/annotation mode
      if ((analysisMode || annotationMode) && hasPose && frame && annPhase && annData?.[annPhase]?.info_circles?.length) {
        const scalePxConn = manualZoomBounds ? (manualZoomBounds.rightX - manualZoomBounds.leftX) : 1;
        if (manualZoomBounds) {
          ctx.restore();
        }
        const poseContainer = canvas.closest('.pose-container');
        const wrapper = canvas.parentElement;
        const isFreezeFrameLayout = poseContainer?.classList.contains('analysis-feedback-visible') && wrapper;
        let offsetY = 0, wrapperH = H;
        if (isFreezeFrameLayout) {
          const wr = wrapper.getBoundingClientRect();
          wrapperH = wr.height;
          if (wrapperH > H) offsetY = (wrapperH - H) / 2;
        }
        annData[annPhase].info_circles.forEach(ic => {
          let anchorX, anchorY, posX, posY;
          if (ic.type === 'joint' && ic.joint_index != null) {
            const p = frame[ic.joint_index];
            if (!p) return;
            anchorX = p[0]; anchorY = p[1];
          } else if (ic.type === 'limb' && ic.joints && ic.joints.length >= 2) {
            const p1 = frame[ic.joints[0]], p2 = frame[ic.joints[1]];
            if (!p1 || !p2) return;
            anchorX = (p1[0] + p2[0]) / 2;
            anchorY = (p1[1] + p2[1]) / 2;
          } else return;
          if (Array.isArray(ic.position) && ic.position.length >= 2) {
            posX = ic.position[0]; posY = ic.position[1];
          } else {
            posX = anchorX; posY = anchorY;
          }
          if (Math.abs(posX - anchorX) < 0.001 && Math.abs(posY - anchorY) < 0.001) return;
          const [x1, y1] = mapPosePointToCanvas(anchorX, anchorY, W, H);
          const x2 = posX * W;
          const y2 = isFreezeFrameLayout ? posY * wrapperH - offsetY : posY * H;
          ctx.strokeStyle = 'rgba(245, 200, 66, 0.8)';
          ctx.lineWidth = 2 * scalePxConn;
          ctx.setLineDash([6, 4]);
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.setLineDash([]);
        });
        if (manualZoomBounds) {
          applyManualZoomTransform(ctx, W, H);
        }
      }

      // --- draw ball detection (always, independent of pose) ---
      const bbox = ballData?.[idx];
      if (bbox) {
        const [x1,y1,x2,y2] = bbox;
        const cx = ((x1+x2)/2)*W;
        const cy = ((y1+y2)/2)*H;
        const r  = ((x2-x1)*W)/2;
        ctx.strokeStyle='red';
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(cx,cy,r,0,2*Math.PI);
        ctx.stroke();
      }

      // --- draw original ball location until contact frame ---
      // contact_frame comes from ballTrajectory.json, not ballInfo
      const contactFrame = Number(ballTrajectory?.contact_frame) || Number(ballInfo?.contact_frame) || 0;
      /* console.log(`[BallDraw] idx=${idx}, contactFrame=${contactFrame}, origBall=${!!origBall}, ballTrajectory=${!!ballTrajectory}`); */
      
      if (origBall) {
        if (idx <= contactFrame) {
          const [ox1, oy1, ox2, oy2] = origBall;
          /* console.log(`[BallDraw] Drawing origBall at idx=${idx}: [${ox1}, ${oy1}, ${ox2}, ${oy2}]`); */
          const ocx = ((ox1 + ox2) / 2) * W;
          const ocy = ((oy1 + oy2) / 2) * H;
          const orr = ((ox2 - ox1) * W) / 2;
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(ocx, ocy, orr, 0, 2 * Math.PI);
          ctx.stroke();
        }
      } else {
        /* console.log('[BallDraw] origBall is null/undefined'); */
      }

      // --- draw ball trajectory from ball_trajectory.json (after contact frame only) ---
      if (ballTrajectory && ballTrajectory.t_values && ballTrajectory.x_values && ballTrajectory.y_values && idx > contactFrame) {
        // Compute ball radius from orig_ball (normalized width → pixel radius)
        let trajBallR = 6; // fallback radius
        if (origBall) {
          trajBallR = ((origBall[2] - origBall[0]) * W) / 2;
        }
        const trajPts = ballTrajectory.t_values.map((t, i) => ({
          frame: t,
          x: ballTrajectory.x_values[i] * W,
          y: ballTrajectory.y_values[i] * H
        }));

        // Draw ball circles at each trajectory data point (orig_ball sized)
        trajPts.forEach((tp, tIdx) => {
          const isCurrent = tp.frame === idx || (tIdx === trajPts.length - 1 && idx >= tp.frame);
          ctx.save();
          if (isCurrent) {
            // Current ball: solid, prominent
            ctx.strokeStyle = 'rgba(220, 30, 30, 0.95)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(tp.x, tp.y, trajBallR, 0, 2 * Math.PI);
            ctx.stroke();
            ctx.fillStyle = 'rgba(220, 30, 30, 0.45)';
            ctx.fill();
          } else {
            // Ghost positions: very subtle
            const alpha = 0.06 + 0.14 * (tIdx / Math.max(1, trajPts.length - 1));
            ctx.strokeStyle = `rgba(255, 60, 60, ${alpha})`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(tp.x, tp.y, trajBallR, 0, 2 * Math.PI);
            ctx.stroke();
          }
          ctx.restore();
        });
      }

      // Draw trajectory on pose canvas if enabled (from ballData)
      if (window.showTrajectoryOnPose && Array.isArray(ballData) && ballData.length) {
        // Map ball centers to pose-canvas coordinates, account for overlay translation
        const win = 18; // frames before/after contact to show
        // compute contact index (prefer ballInfo.contact_frame)
        const contactIdx = Math.max(0, Math.min(Math.round(Number(ballInfo?.contact_frame) || idx), ballData.length - 1));
        const start = Math.max(0, contactIdx - win);
        const end = Math.min(ballData.length - 1, contactIdx + win);
        const pts = [];
        for (let i = start; i <= end; i++) {
          const b = ballData[i];
          if (!b) continue;
          const [bx1,by1,bx2,by2] = b;
          let cx = ((bx1+bx2)/2) * W;
          let cy = ((by1+by2)/2) * H;
          // apply overlay translation if present (so trajectory lines up with overlay joints)
          if (overlayAlignOffsetN) {
            cx += overlayAlignOffsetN.dx * W;
            cy += overlayAlignOffsetN.dy * H;
          }
          pts.push({i, x: cx, y: cy});
        }
        if (pts.length >= 2) {
          ctx.save();
          const rawPts = pts.map(p=>({x:p.x,y:p.y,i:p.i}));
          const smooth = catmullRomSpline(rawPts, 6);
          // draw full smooth path
          ctx.lineWidth = 2.5; ctx.beginPath();
          for (let k = 0; k < smooth.length; k++) { const sp = smooth[k]; if (k===0) ctx.moveTo(sp.x, sp.y); else ctx.lineTo(sp.x, sp.y); }
          ctx.strokeStyle = 'rgba(255,160,0,0.95)'; ctx.stroke();
          // split near contact into approach vs post-contact
          const contactPoint = pts.find(p=>p.i===contactIdx) || pts[Math.floor(pts.length/2)];
          if (contactPoint) {
            let nearestK = 0, bestD = Infinity;
            for (let k=0;k<smooth.length;k++){ const d2 = (smooth[k].x - contactPoint.x)**2 + (smooth[k].y - contactPoint.y)**2; if (d2 < bestD) { bestD = d2; nearestK = k; } }
            ctx.lineWidth = 1.25 * (tx ? Math.max(1/tx.sx, 1/tx.sy) : 1); ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); for (let k=0;k<=nearestK;k++){ const sp=smooth[k]; if(k===0)ctx.moveTo(sp.x,sp.y); else ctx.lineTo(sp.x,sp.y);} ctx.stroke();
            ctx.lineWidth = 2.5 * (tx ? 1/tx.s : 1); ctx.strokeStyle = 'rgba(255,160,0,0.95)'; ctx.beginPath(); for (let k=nearestK;k<smooth.length;k++){ const sp=smooth[k]; if(k===nearestK)ctx.moveTo(sp.x,sp.y); else ctx.lineTo(sp.x,sp.y);} ctx.stroke();
          }
          // draw contact marker
          const contactP = pts.find(p=>p.i===contactIdx) || pts[Math.floor(pts.length/2)];
          if (contactP) { ctx.fillStyle='rgba(255,80,0,0.95)'; ctx.beginPath(); ctx.arc(contactP.x, contactP.y, 6, 0, Math.PI*2); ctx.fill(); }
          ctx.restore();
        }
      }

      // --- Shaded area between player and pro foot paths (backswing to contact only) ---
      const hideFootPathAtKeyframe = analysisMode && analysisPhase === 'backswing';
      const showFootPathInSegment = !analysisMode || analysisPhase === 'playing-to-contact' || analysisPhase === 'contact';
      const transFrameFromTrajectoryPose = ballTrajectory?.transition_frame != null ? Number(ballTrajectory.transition_frame) : null;
      if (showFootPath && playerFootPathPts && proFootPathPts && playerFootPathPts.length >= 2 && proFootPathPts.length >= 2 && proOverlayActive && proPoseData && proBallTrajectory && !hideFootPathAtKeyframe && showFootPathInSegment && Number.isFinite(transFrameFromTrajectoryPose)) {
        const transFrame = Math.round(transFrameFromTrajectoryPose);
        const cf = Number(ballTrajectory?.contact_frame ?? ballInfo?.contact_frame ?? 0);
        const proTransFrame = proBallTrajectory.transition_frame != null ? Math.round(Number(proBallTrajectory.transition_frame)) : transFrame;
        const proCf = proBallTrajectory.contact_frame != null ? Math.round(Number(proBallTrajectory.contact_frame)) : Math.round(cf);
        const { toPxPro } = getProPathToScreenPx(proCf, W, H, flipProX);
        const playerApproach = playerFootPathPts.filter(p => p.i >= transFrame && p.i <= cf);
        const proApproach = proFootPathPts.filter(p => p.i >= proTransFrame && p.i <= proCf);
        if (playerApproach.length >= 2 && proApproach.length >= 2) {
          const toPxPlayer = (p) => ({ x: p.x * W, y: p.y * H });
          const playerPts = playerApproach.map(toPxPlayer);
          const proPts = proApproach.map(toPxPro);
          const smoothPlayer = catmullRomSpline(playerPts.map(p => ({ x: p.x, y: p.y })), 4);
          const smoothPro = catmullRomSpline(proPts.map(p => ({ x: p.x, y: p.y })), 4);
          const N = Math.min(smoothPlayer.length, smoothPro.length, 40);
          const playerSamp = [];
          const proSamp = [];
          for (let k = 0; k < N; k++) {
            const u = k / (N - 1);
            const i1 = Math.floor(u * (smoothPlayer.length - 1));
            const i2 = Math.min(i1 + 1, smoothPlayer.length - 1);
            const t = (u * (smoothPlayer.length - 1)) - i1;
            playerSamp.push({
              x: smoothPlayer[i1].x + t * (smoothPlayer[i2].x - smoothPlayer[i1].x),
              y: smoothPlayer[i1].y + t * (smoothPlayer[i2].y - smoothPlayer[i1].y)
            });
            const j1 = Math.floor(u * (smoothPro.length - 1));
            const j2 = Math.min(j1 + 1, smoothPro.length - 1);
            const s = (u * (smoothPro.length - 1)) - j1;
            proSamp.push({
              x: smoothPro[j1].x + s * (smoothPro[j2].x - smoothPro[j1].x),
              y: smoothPro[j1].y + s * (smoothPro[j2].y - smoothPro[j1].y)
            });
          }
          let maxDist = 1;
          for (let k = 0; k < N; k++) {
            const d = Math.hypot(playerSamp[k].x - proSamp[k].x, playerSamp[k].y - proSamp[k].y);
            if (d > maxDist) maxDist = d;
          }
          if (maxDist < 1) maxDist = 1;
          ctx.save();
          ctx.globalAlpha = 0.35;
          for (let k = 0; k < N - 1; k++) {
            const d = Math.hypot(
              (playerSamp[k].x + playerSamp[k + 1].x) / 2 - (proSamp[k].x + proSamp[k + 1].x) / 2,
              (playerSamp[k].y + playerSamp[k + 1].y) / 2 - (proSamp[k].y + proSamp[k + 1].y) / 2
            );
            const t = Math.min(1, d / maxDist);
            const r = Math.round(100 + 155 * t);
            const g = Math.round(180 + 50 * t);
            const b = Math.round(100 - 100 * t);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.12)`;
            ctx.beginPath();
            ctx.moveTo(playerSamp[k].x, playerSamp[k].y);
            ctx.lineTo(playerSamp[k + 1].x, playerSamp[k + 1].y);
            ctx.lineTo(proSamp[k + 1].x, proSamp[k + 1].y);
            ctx.lineTo(proSamp[k].x, proSamp[k].y);
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
        }
      }

      // --- Strike foot path trajectory (uses precomputed playerFootPathPts) ---
      if (showFootPath && playerFootPathPts && playerFootPathPts.length >= 2 && Number.isFinite(transFrameFromTrajectoryPose) && !hideFootPathAtKeyframe && showFootPathInSegment) {
        const transFrame = Math.round(transFrameFromTrajectoryPose);
        const cf = Number(ballTrajectory?.contact_frame ?? ballInfo?.contact_frame ?? 0);
        const endFrame = analysisMode ? Math.round(cf) : Math.min((Array.isArray(poseData) ? poseData.length - 1 : 0), Math.round(cf) + 30);
        const drawEnd = Math.min(idx, endFrame);
        if (transFrame <= drawEnd) {
          const toPx = (p) => ({ ...p, x: p.x * W, y: p.y * H });
          const ptsPx = playerFootPathPts.map(toPx);
          const elapsed = ptsPx.filter(p => p.i <= drawEnd);
          const future = ptsPx.filter(p => p.i > drawEnd);
          if (elapsed.length >= 2) {
            ctx.save();
            const smooth = catmullRomSpline(elapsed, 6);
            const lineW = 3 * (manualZoomBounds ? (1 / (tx?.s ?? 1)) : 1);
            // Glow: draw wider semi-transparent stroke first
            ctx.lineWidth = lineW * 2.5;
            ctx.strokeStyle = 'rgba(200, 255, 200, 0.3)';
            ctx.beginPath();
            for (let k = 0; k < smooth.length; k++) {
              if (k === 0) ctx.moveTo(smooth[k].x, smooth[k].y);
              else ctx.lineTo(smooth[k].x, smooth[k].y);
            }
            ctx.stroke();
            // Main light green path
            ctx.lineWidth = lineW;
            ctx.strokeStyle = 'rgba(200, 255, 200, 0.95)';
            ctx.beginPath();
            for (let k = 0; k < smooth.length; k++) {
              if (k === 0) ctx.moveTo(smooth[k].x, smooth[k].y);
              else ctx.lineTo(smooth[k].x, smooth[k].y);
            }
            ctx.stroke();
            elapsed.forEach((fp, fpIdx) => {
              const alpha = 0.2 + 0.6 * (fpIdx / Math.max(1, elapsed.length - 1));
              const isCurrent = fp.i === drawEnd;
              ctx.beginPath();
              ctx.arc(fp.x, fp.y, isCurrent ? 5 : 3, 0, 2 * Math.PI);
              if (isCurrent) {
                ctx.fillStyle = 'rgba(200, 255, 200, 0.95)';
                ctx.strokeStyle = 'rgba(200, 255, 200, 0.9)';
                ctx.lineWidth = 2;
                ctx.fill();
                ctx.stroke();
              } else {
                ctx.fillStyle = `rgba(200, 255, 200, ${alpha})`;
                ctx.fill();
              }
            });
            if (!(analysisMode && analysisPhase === 'contact')) {
              future.forEach(fp => {
                ctx.beginPath();
                ctx.arc(fp.x, fp.y, 2, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(200, 255, 200, 0.1)';
                ctx.fill();
              });
            }
            // Contact frame: draw direction arrow (white -> green gradient, locally weighted avg direction)
            if (analysisMode && analysisPhase === 'contact' && drawEnd === Math.round(cf) && smooth.length >= 2) {
              const contactPt = smooth[smooth.length - 1];
              const dir = computeLocalDirection(smooth, 5);
              if (dir) {
                const arrowLen = 0.12 * Math.min(W, H);
                const playerArrowStops = [[0,'rgba(255,255,255,0.98)'],[0.2,'rgba(220,255,220,0.95)'],[0.45,'rgba(150,255,180,0.95)'],[0.7,'rgba(80,220,130,0.95)'],[0.88,'rgba(40,180,90,0.95)'],[1,'rgba(20,120,60,0.98)']];
                drawFootPathDirectionArrow(ctx, contactPt.x, contactPt.y, dir.dx, dir.dy, arrowLen, playerArrowStops);
              }
            }
            ctx.restore();
          }
        }
      }

      // --- Pro overlay foot path (uses precomputed proFootPathPts) ---
      if (showFootPath && proFootPathPts && proFootPathPts.length >= 2 && proOverlayActive && proPoseData && proBallTrajectory && !hideFootPathAtKeyframe && showFootPathInSegment) {
        const proCf = proBallTrajectory.contact_frame != null ? Math.round(Number(proBallTrajectory.contact_frame)) : null;
        const proCfAligned = (proCf != null && Number.isFinite(proCf)) ? proCf : Number(ballTrajectory?.contact_frame ?? ballInfo?.contact_frame ?? 0);
        const { toPxPro } = getProPathToScreenPx(proCfAligned, W, H, flipProX);
        const proCurrentIdx = Math.max(0, Math.min(idx + proFrameShift, proPoseData.length - 1));
        const proDrawEnd = (analysisMode && (analysisPhase === 'backswing' || analysisPhase === 'contact')) ? proCf : proCurrentIdx;
        const toPx = (p) => ({ ...p, ...toPxPro(p) });
        const ptsPx = proFootPathPts.map(toPx);
        const elapsed = ptsPx.filter(p => p.i <= proDrawEnd);
        const future = ptsPx.filter(p => p.i > proDrawEnd);
        if (elapsed.length >= 2) {
          ctx.save();
          const proSmooth = catmullRomSpline(elapsed, 6);
          ctx.lineWidth = 3 * (manualZoomBounds ? (1 / (tx?.s ?? 1)) : 1);
          ctx.strokeStyle = 'rgba(255, 220, 50, 0.5)';
          ctx.beginPath();
          for (let k = 0; k < proSmooth.length; k++) {
            if (k === 0) ctx.moveTo(proSmooth[k].x, proSmooth[k].y);
            else ctx.lineTo(proSmooth[k].x, proSmooth[k].y);
          }
          ctx.stroke();
          elapsed.forEach((fp, fpIdx) => {
            const alpha = 0.15 + 0.4 * (fpIdx / Math.max(1, elapsed.length - 1));
            const isCurrent = fp.i === Math.round(proDrawEnd);
            ctx.beginPath();
            ctx.arc(fp.x, fp.y, isCurrent ? 5 : 3, 0, 2 * Math.PI);
            if (isCurrent) {
              ctx.fillStyle = 'rgba(255, 230, 70, 0.7)';
              ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
              ctx.lineWidth = 2;
              ctx.fill();
              ctx.stroke();
            } else {
              ctx.fillStyle = `rgba(255, 220, 50, ${alpha})`;
              ctx.fill();
            }
          });
          if (!(analysisMode && analysisPhase === 'contact')) {
            future.forEach(fp => {
              ctx.beginPath();
              ctx.arc(fp.x, fp.y, 2, 0, 2 * Math.PI);
              ctx.fillStyle = 'rgba(255, 220, 50, 0.08)';
              ctx.fill();
            });
          }
          // Contact frame: draw direction arrow (yellow gradient shading, locally weighted avg direction)
          if (analysisMode && analysisPhase === 'contact' && proCf != null && proDrawEnd === proCf && proSmooth.length >= 2) {
            const contactPt = proSmooth[proSmooth.length - 1];
            const dir = computeLocalDirection(proSmooth, 5);
            if (dir) {
              const arrowLen = 0.12 * Math.min(W, H);
              const proArrowStops = [[0,'rgba(255,255,220,0.98)'],[0.2,'rgba(255,250,180,0.95)'],[0.45,'rgba(255,230,100,0.95)'],[0.7,'rgba(255,200,50,0.95)'],[0.88,'rgba(220,165,30,0.95)'],[1,'rgba(180,130,20,0.98)']];
              drawFootPathDirectionArrow(ctx, contactPt.x, contactPt.y, dir.dx, dir.dy, arrowLen, proArrowStops);
            }
          }
          ctx.restore();
        }
      }

      // --- Knee & hip angle overlay (computed before transform restore, drawn after) ---
      // At keyframes (paused at backswing/contact): use showAnglesAtKeyframe; else use showAnglesActive
      const isKeyframePause = analysisMode && (analysisPhase === 'backswing' || analysisPhase === 'contact');
      const shouldShowAngles = isKeyframePause ? showAnglesAtKeyframe : showAnglesActive;
      let kneeHipAngleLabels = [];
      if (shouldShowAngles && hasPose) {
        const angleDefs = getAngleJointDefs(poseType);
        angleDefs.forEach((def, defIdx) => {
          const [i1, i2, i3] = def.joints;
          const angle = computeJointAngle(frame, i1, i2, i3);
          if (angle == null) return;
          const p1 = frame[i1], p2 = frame[i2], p3 = frame[i3];
          if (!p1 || !p2 || !p3) return;
          const m1 = mapPosePointToCanvas(p1[0], p1[1], W, H);
          const m2 = mapPosePointToCanvas(p2[0], p2[1], W, H);
          const m3 = mapPosePointToCanvas(p3[0], p3[1], W, H);
          kneeHipAngleLabels.push({ name: def.name, angle, m1, m2, m3, color: def.color, defIdx });
        });
      }

      // --- angle overlay: compute mapped screen-space positions so labels render correctly
      // We'll compute mapped coordinates now; drawing happens after we restore the canvas transform
      let angleOverlay = null;
      if (hasPose) {
        const sel = Array.from(selectedJoints);
        if (sel.length === 2) {
          const [iA, iB] = sel;
          const pA = frame[iA], pB = frame[iB];
          if (pA && pB) {
            const mA = mapPosePointToCanvas(pA[0], pA[1], W, H);
            const mB = mapPosePointToCanvas(pB[0], pB[1], W, H);
            const dx = mB[0] - mA[0], dy = mB[1] - mA[1];
            let ang = toDeg(Math.atan2(dx, dy)); ang = Math.abs(ang);
            angleOverlay = { type: 'line', a: mA, b: mB, ang };
            /* console.log('[AngleOverlay] computed line overlay', angleOverlay); */
          }
        } else if (sel.length === 3) {
          const [i1,i2,i3] = sel;
          const P1 = frame[i1], P2 = frame[i2], P3 = frame[i3];
          if (P1 && P2 && P3) {
            const m1 = mapPosePointToCanvas(P1[0], P1[1], W, H);
            const m2 = mapPosePointToCanvas(P2[0], P2[1], W, H);
            const m3 = mapPosePointToCanvas(P3[0], P3[1], W, H);
            const vBA = { x: m1[0]-m2[0], y: m1[1]-m2[1] };
            const vBC = { x: m3[0]-m2[0], y: m3[1]-m2[1] };
            const dot = vBA.x*vBC.x + vBA.y*vBC.y;
            const mag = Math.hypot(vBA.x,vBA.y)*Math.hypot(vBC.x,vBC.y);
            if (mag > 0) {
              let ang = toDeg(Math.acos(Math.max(-1, Math.min(1, dot/mag))));
              angleOverlay = { type: 'angle', a: m1, b: m2, c: m3, ang };
              /* console.log('[AngleOverlay] computed angle overlay', angleOverlay); */
            }
          }
        }
      }

      // Restore transform if manual zoom was applied
      let restoredEarly = false;
      if (manualZoomBounds) {
        restoreTransform(ctx);
        restoredEarly = true;
      }

      // Draw angle overlay in screen-space (mapped coordinates)
      if (angleOverlay) {
        if (angleOverlay.type === 'line') {
          const xA = angleOverlay.a[0], yA = angleOverlay.a[1];
          const xB = angleOverlay.b[0], yB = angleOverlay.b[1];
          ctx.strokeStyle = 'yellow'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(xA,yA); ctx.lineTo(xB,yB); ctx.stroke();
          const mx = (xA + xB)/2, my = (yA + yB)/2;
          ctx.font = '16px sans-serif'; ctx.textBaseline = 'middle';
          // stroke for contrast then fill
          ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.strokeText(`${angleOverlay.ang.toFixed(1)}°`, mx + 5, my - 5);
          ctx.fillStyle = 'yellow'; ctx.fillText(`${angleOverlay.ang.toFixed(1)}°`, mx + 5, my - 5);
        } else if (angleOverlay.type === 'angle') {
          const x1 = angleOverlay.a[0], y1 = angleOverlay.a[1];
          const x2 = angleOverlay.b[0], y2 = angleOverlay.b[1];
          const x3 = angleOverlay.c[0], y3 = angleOverlay.c[1];
          ctx.strokeStyle='yellow'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke();
          ctx.font='16px sans-serif'; ctx.textBaseline = 'middle';
          ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.strokeText(`${angleOverlay.ang.toFixed(1)}°`, x2 + 5, y2 - 5);
          ctx.fillStyle='yellow'; ctx.fillText(`${angleOverlay.ang.toFixed(1)}°`, x2 + 5, y2 - 5);
        }
      }

      // Draw knee & hip angle overlays in screen-space
      if (kneeHipAngleLabels.length > 0) {
        ctx.save();
        ctx.font = 'bold 12px Inter, sans-serif';
        ctx.textBaseline = 'middle';

        // Compute a rough pose bounding box so labels can be placed outside the figure
        let poseMinX = W, poseMaxX = 0, poseMinY = H, poseMaxY = 0;
        kneeHipAngleLabels.forEach(l => {
          [l.m1, l.m2, l.m3].forEach(p => {
            if (p[0] < poseMinX) poseMinX = p[0];
            if (p[0] > poseMaxX) poseMaxX = p[0];
            if (p[1] < poseMinY) poseMinY = p[1];
            if (p[1] > poseMaxY) poseMaxY = p[1];
          });
        });
        const poseW = poseMaxX - poseMinX || 1;

        // Determine label margin — place labels at a comfortable distance outside the figure
        const labelMargin = Math.max(60, poseW * 0.35);

        // Build a lookup so we can compare L/R counterpart positions
        const angleLabelByIdx = {};
        kneeHipAngleLabels.forEach(l => { angleLabelByIdx[l.defIdx] = l; });

        kneeHipAngleLabels.forEach(label => {
          // Draw connecting lines through the three joints
          ctx.strokeStyle = label.color;
          ctx.lineWidth = 2.5;
          ctx.globalAlpha = 0.8;
          ctx.beginPath();
          ctx.moveTo(label.m1[0], label.m1[1]);
          ctx.lineTo(label.m2[0], label.m2[1]);
          ctx.lineTo(label.m3[0], label.m3[1]);
          ctx.stroke();
          ctx.globalAlpha = 1;

          // Draw small arc at vertex
          const arcRadius = 18;
          const startAngle = Math.atan2(label.m1[1] - label.m2[1], label.m1[0] - label.m2[0]);
          const endAngle = Math.atan2(label.m3[1] - label.m2[1], label.m3[0] - label.m2[0]);
          ctx.beginPath();
          ctx.arc(label.m2[0], label.m2[1], arcRadius, startAngle, endAngle);
          ctx.strokeStyle = label.color;
          ctx.lineWidth = 1.5;
          ctx.stroke();

          // --- Position label outside the figure with a leader line ---
          const text = `${label.name}: ${label.angle.toFixed(1)}°`;
          const textWidth = ctx.measureText(text).width;
          const pad = 5;
          const boxW = textWidth + pad * 2;
          const boxH = 20;

          // Determine placement side by comparing actual screen-space positions
          // of L/R counterpart joints (pairs: L Knee↔R Knee, L Hip↔R Hip)
          const pairIdx = label.defIdx % 2 === 0 ? label.defIdx + 1 : label.defIdx - 1;
          const pairLabel = angleLabelByIdx[pairIdx];
          let isLeft;
          if (pairLabel) {
            // Place whichever joint is further left on screen to the left side
            isLeft = label.m2[0] <= pairLabel.m2[0];
          } else {
            isLeft = label.defIdx % 2 === 0;
          }
          const isKnee = label.defIdx < 2;
          const vertStagger = isKnee ? 20 : -20; // separate knee from hip label

          let labelX, labelY;
          if (isLeft) {
            labelX = poseMinX - labelMargin;
          } else {
            labelX = poseMaxX + labelMargin - boxW;
          }
          labelY = label.m2[1] + vertStagger;

          // Clamp label to canvas bounds
          labelX = Math.max(pad, Math.min(W - boxW - pad, labelX));
          labelY = Math.max(boxH / 2 + pad, Math.min(H - boxH / 2 - pad, labelY));

          // Leader line: from joint vertex to nearest edge of label box
          const jointX = label.m2[0], jointY = label.m2[1];
          // Compute anchor on box edge closest to joint
          let anchorX, anchorY;
          if (isLeft) {
            anchorX = labelX + boxW; // right edge of box
          } else {
            anchorX = labelX; // left edge of box
          }
          anchorY = Math.max(labelY - boxH / 2, Math.min(labelY + boxH / 2, jointY));

          // Draw leader line
          ctx.strokeStyle = label.color;
          ctx.lineWidth = 1;
          ctx.globalAlpha = 0.7;
          ctx.setLineDash([4, 3]);
          ctx.beginPath();
          ctx.moveTo(jointX, jointY);
          ctx.lineTo(anchorX, anchorY);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;

          // Small dot at joint end of leader
          ctx.fillStyle = label.color;
          ctx.beginPath();
          ctx.arc(jointX, jointY, 3, 0, Math.PI * 2);
          ctx.fill();

          // Background pill (with roundRect fallback)
          const cornerR = 6;
          const rx = labelX - pad, ry = labelY - boxH / 2, rw = boxW + pad, rh = boxH;
          const drawPill = () => {
            if (typeof ctx.roundRect === 'function') {
              ctx.roundRect(rx, ry, rw, rh, cornerR);
            } else {
              ctx.moveTo(rx + cornerR, ry);
              ctx.lineTo(rx + rw - cornerR, ry);
              ctx.arcTo(rx + rw, ry, rx + rw, ry + cornerR, cornerR);
              ctx.lineTo(rx + rw, ry + rh - cornerR);
              ctx.arcTo(rx + rw, ry + rh, rx + rw - cornerR, ry + rh, cornerR);
              ctx.lineTo(rx + cornerR, ry + rh);
              ctx.arcTo(rx, ry + rh, rx, ry + rh - cornerR, cornerR);
              ctx.lineTo(rx, ry + cornerR);
              ctx.arcTo(rx, ry, rx + cornerR, ry, cornerR);
              ctx.closePath();
            }
          };
          ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
          ctx.beginPath();
          drawPill();
          ctx.fill();
          // Border
          ctx.strokeStyle = label.color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          drawPill();
          ctx.stroke();
          // Text
          ctx.fillStyle = label.color;
          ctx.fillText(text, labelX, labelY);
        });
        ctx.restore();
      }
      updateProDisparityInfoBtns();
      updateBackswingInfoBtns();
      updateAnnotationInfoBtns();
    }

    function updateProDisparityInfoBtns() {
      const container = document.getElementById('proDisparityInfoBtns');
      const canvas = document.getElementById('poseCanvas');
      if (!container || !canvas) return;
      const data = window.__proDisparitiesForInfoBtns;
      container.innerHTML = '';
      if (!data || !data.disparities || data.disparities.length === 0) return;
      const wrapper = canvas.closest('.pose-canvas-wrapper');
      if (!wrapper) return;
      const rect = canvas.getBoundingClientRect();
      const W = data.W, H = data.H;
      const _sf = data.sf || 1, _sxB = data.sxBase != null ? data.sxBase : data.dxPx, _syB = data.syBase != null ? data.syBase : data.dyPx;
      data.disparities.forEach((d, i) => {
        const p = data.frPro[d.vertexIdx];
        if (!p) return;
        const px = (p[0] * W * _sf + _sxB) / W;
        const py = (p[1] * H * _sf + _syB) / H;
        const btn = document.createElement('button');
        btn.className = 'pro-info-btn';
        btn.textContent = 'i';
        btn.title = `${d.name}: You ${Math.round(d.userAngle)}° vs Pro ${Math.round(d.proAngle)}°`;
        btn.style.left = `${px * 100}%`;
        btn.style.top = `${py * 100}%`;
        btn.style.transform = 'translate(-50%, -50%)';
        const dCopy = d;
        btn.onclick = (e) => {
          e.stopPropagation();
          const popup = document.getElementById('proDisparityPopup');
          const titleEl = document.getElementById('proDisparityPopupTitle');
          const textEl = document.getElementById('proDisparityPopupText');
          if (popup && titleEl && textEl) {
            const suggestion = PRO_DISPARITY_SUGGESTIONS[dCopy.name]?.[dCopy.phase] || `Your ${dCopy.name} angle is ${Math.round(dCopy.diff)}° different from the pro.`;
            titleEl.textContent = `${dCopy.name} (${dCopy.phase})`;
            textEl.innerHTML = `You: <strong>${Math.round(dCopy.userAngle)}°</strong> | Pro: <strong>${Math.round(dCopy.proAngle)}°</strong><br><br>${suggestion.replace(/\n/g, '<br>')}`;
            popup.style.display = 'flex';
          }
        };
        container.appendChild(btn);
      });
    }

    const BACKSWING_LIMB_INFO = {
      'Plant Shank': {
        title: 'Plant Shank',
        text: 'The plant leg shank (tibia) should be nearly vertical or tilted slightly forward at peak backswing. A vertical plant shank provides a stable base, allowing the kicking leg to generate maximum angular velocity. If the shank is angled too far forward, it shifts the center of mass ahead of the plant foot, reducing balance and power transfer.'
      },
      'Strike Thigh': {
        title: 'Strike Thigh',
        text: 'The kicking leg thigh should be extended well behind the body during the backswing. Greater hip extension (thigh pulled back 30-45° past vertical) stretches the hip flexors and stores elastic energy. This "pre-stretch" enables a more explosive forward swing. Insufficient backswing of the thigh limits the range of motion available for acceleration.'
      },
      'Plant Forearm': {
        title: 'Plant Forearm',
        text: 'The plant-side forearm should be positioned forward and slightly across the body at peak backswing. This arm acts as a counterbalance to the kicking leg, helping maintain rotational equilibrium. An extended plant forearm also helps guide the upper body lean and keeps the torso from rotating too early.'
      },
      'Plant Upper Arm': {
        title: 'Plant Upper Arm',
        text: 'The plant-side upper arm should be abducted and slightly forward during the backswing. This creates a wider moment of inertia in the upper body, which stabilizes the torso against the angular momentum of the kicking leg. A well-positioned upper arm contributes to balance and allows for a smoother energy transfer from ground up through the kinetic chain.'
      }
    };

    let _bsPopupDragState = null;
    let _bsPopupAnchor = null;
    let _currentInfoCircleRef = null;
    let _bsPopupEditCleanup = null;

    function updateBackswingInfoBtns() {
      const container = document.getElementById('backswingInfoBtns');
      const canvas = document.getElementById('poseCanvas');
      if (!container || !canvas) return;

      const data = window.__backswingRedLimbs;
      container.innerHTML = '';

      if (!data || !data.limbs || data.limbs.length === 0 || !analysisMode || analysisPhase !== 'backswing') {
        closeBsPopup();
        return;
      }

      const W = data.W, H = data.H;

      data.limbs.forEach(limb => {
        const [i1, i2] = limb.joints;
        const p1 = data.frame[i1], p2 = data.frame[i2];
        if (!p1 || !p2) return;

        const midX = (p1[0] + p2[0]) / 2;
        const midY = (p1[1] + p2[1]) / 2;

        const dx = p2[0] - p1[0];
        const dy = p2[1] - p1[1];
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const perpX = -dy / len;
        const perpY = dx / len;
        const offsetPct = 0.04;
        const btnX = midX + perpX * offsetPct;
        const btnY = midY + perpY * offsetPct;

        const btn = document.createElement('button');
        btn.className = 'bs-info-btn';
        btn.textContent = 'i';
        btn.title = limb.name;
        btn.style.left = `${btnX * 100}%`;
        btn.style.top = `${btnY * 100}%`;
        btn.style.transform = 'translate(-50%, -50%)';

        const limbCopy = { ...limb, anchorPctX: midX, anchorPctY: midY };
        btn.onclick = (e) => {
          e.stopPropagation();
          openBsPopup(limbCopy);
        };
        container.appendChild(btn);
      });
    }

    const BS_POPUP_GAP = 12;
    function positionAndShowBsPopup(anchorX, anchorY, containerRect, savedPosition, showDragHandle) {
      const popup = document.getElementById('bsDraggablePopup');
      const svg = document.getElementById('bsConnectorSvg');
      const dragHandle = document.getElementById('bsPopupDragHandle');
      if (!popup || !containerRect) return;
      if (svg) svg.style.display = 'none';
      const popW = 260, popH = popup.offsetHeight || 100;
      let popX, popY;
      popup.classList.remove('bs-popup-spawn-left', 'bs-popup-spawn-right');
      if (Array.isArray(savedPosition) && savedPosition.length >= 2 && Number.isFinite(savedPosition[0]) && Number.isFinite(savedPosition[1])) {
        popX = Math.max(5, Math.min(savedPosition[0] * containerRect.width, containerRect.width - popW - 5));
        popY = Math.max(5, Math.min(savedPosition[1] * containerRect.height, containerRect.height - popH - 5));
        popup.classList.add('bs-popup-spawn-saved');
      } else {
        const spaceRight = containerRect.width - anchorX - BS_POPUP_GAP;
        const spaceLeft = anchorX - BS_POPUP_GAP;
        const placeRight = spaceRight >= popW || spaceRight >= spaceLeft;
        if (placeRight) {
          popX = anchorX + BS_POPUP_GAP;
        } else {
          popX = anchorX - BS_POPUP_GAP - popW;
        }
        popY = anchorY - popH / 2;
        popX = Math.max(5, Math.min(popX, containerRect.width - popW - 5));
        popY = Math.max(5, Math.min(popY, containerRect.height - popH - 5));
        void popup.offsetHeight;
        popup.classList.add(placeRight ? 'bs-popup-spawn-right' : 'bs-popup-spawn-left');
      }
      popup.style.left = popX + 'px';
      popup.style.top = popY + 'px';
      popup.style.display = 'block';
      if (dragHandle) dragHandle.style.display = showDragHandle ? 'block' : 'none';
    }

    function openBsPopup(limb) {
      const popup = document.getElementById('bsDraggablePopup');
      const titleEl = document.getElementById('bsPopupTitle');
      const textEl = document.getElementById('bsPopupText');
      const poseContainer = document.querySelector('.pose-container');
      if (!popup || !titleEl || !textEl || !poseContainer) return;

      const info = BACKSWING_LIMB_INFO[limb.name] || { title: limb.name, text: 'Analysis info for ' + limb.name };
      titleEl.textContent = info.title;
      textEl.textContent = info.text;

      const containerRect = poseContainer.getBoundingClientRect();

      const anchorScreenX = canvasRect.left - containerRect.left + limb.anchorPctX * canvasRect.width;
      const anchorScreenY = canvasRect.top - containerRect.top + limb.anchorPctY * canvasRect.height;

      _bsPopupAnchor = { x: anchorScreenX, y: anchorScreenY };

    function saveBsPopupPosition() {
      if (!_currentInfoCircleRef || !annotationMode) return;
      const { phase, index } = _currentInfoCircleRef;
      const ic = annotationData[phase]?.info_circles?.[index];
      if (!ic) return;
      const popup = document.getElementById('bsDraggablePopup');
      const poseContainer = document.querySelector('.pose-container');
      if (!popup || !poseContainer || popup.style.display === 'none') return;
      const containerRect = poseContainer.getBoundingClientRect();
      const left = parseFloat(popup.style.left) || 0;
      const top = parseFloat(popup.style.top) || 0;
      ic.popup_position = [
        Math.max(0, Math.min(1, left / containerRect.width)),
        Math.max(0, Math.min(1, top / containerRect.height))
      ];
      markAnnotationDirty();
    }

    function closeBsPopup() {
      saveBsPopupPosition();
      if (_bsPopupEditCleanup) { _bsPopupEditCleanup(); _bsPopupEditCleanup = null; }
      const popup = document.getElementById('bsDraggablePopup');
      const editWrap = document.getElementById('bsPopupEditWrap');
      const textEl = document.getElementById('bsPopupText');
      if (editWrap) editWrap.style.display = 'none';
      if (textEl) textEl.style.display = '';

        popup.style.display = 'none';
